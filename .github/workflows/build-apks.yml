name: Build Modern and Legacy APKs

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build both APKs
        run: gradle :app:assembleRelease :modern:assembleRelease

      - name: Copy APKs
        run: |
          mkdir -p apk
          cp app/build/outputs/apk/release/app-release.apk apk/Apkd-Legacy-Android-4.4.apk
          cp modern/build/outputs/apk/release/modern-release.apk apk/Apkd-Modern.apk

      - name: Commit APKs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apk/Apkd-Legacy-Android-4.4.apk apk/Apkd-Modern.apk
          git diff --cached --quiet || git commit -m "Build modern and legacy APKs"
          git push
