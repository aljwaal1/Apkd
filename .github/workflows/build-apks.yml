name: Build APK Downloader and LocalSend

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build signed APKs
        run: gradle :app:assembleRelease :modern:assembleRelease :localsend:assembleRelease

      - name: Locate, verify and copy APKs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p apk

          LEGACY_APK=$(find app/build/outputs/apk/release -type f -name '*.apk' | head -n 1)
          MODERN_APK=$(find modern/build/outputs/apk/release -type f -name '*.apk' | head -n 1)
          LOCALSEND_APK=$(find localsend/build/outputs/apk/release -type f -name '*.apk' | head -n 1)

          test -n "${LEGACY_APK:-}" || { echo "Legacy APK was not generated"; exit 1; }
          test -n "${MODERN_APK:-}" || { echo "Modern APK was not generated"; exit 1; }
          test -n "${LOCALSEND_APK:-}" || { echo "LocalSend APK was not generated"; exit 1; }

          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)
          test -x "$APKSIGNER" || { echo "apksigner was not found"; exit 1; }

          "$APKSIGNER" verify --verbose --print-certs "$LEGACY_APK"
          "$APKSIGNER" verify --verbose --print-certs "$MODERN_APK"
          "$APKSIGNER" verify --verbose --print-certs "$LOCALSEND_APK"

          cp "$LEGACY_APK" apk/Apkd-Legacy-Android-4.4.apk
          cp "$MODERN_APK" apk/Apkd-Modern.apk
          cp "$LOCALSEND_APK" apk/LocalSend-Phone-to-Phone.apk

          ls -lh apk

      - name: Commit installable APKs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apk/Apkd-Legacy-Android-4.4.apk apk/Apkd-Modern.apk apk/LocalSend-Phone-to-Phone.apk
          git diff --cached --quiet || git commit -m "Build APK Downloader and LocalSend APKs"
          git push
