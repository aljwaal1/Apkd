name: Build Modern and Legacy APKs

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build both APKs
        run: gradle :app:assembleRelease :modern:assembleRelease

      - name: Show generated APK files
        run: find . -type f -path '*/build/outputs/apk/*/*.apk' -print

      - name: Copy APKs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p apk

          LEGACY_APK=$(find app/build/outputs/apk -type f -name '*.apk' | head -n 1)
          MODERN_APK=$(find modern/build/outputs/apk -type f -name '*.apk' | head -n 1)

          if [ -z "${LEGACY_APK:-}" ]; then
            echo "Legacy APK was not generated"
            exit 1
          fi

          if [ -z "${MODERN_APK:-}" ]; then
            echo "Modern APK was not generated"
            exit 1
          fi

          echo "Legacy APK: $LEGACY_APK"
          echo "Modern APK: $MODERN_APK"

          cp "$LEGACY_APK" apk/Apkd-Legacy-Android-4.4.apk
          cp "$MODERN_APK" apk/Apkd-Modern.apk

          ls -lh apk

      - name: Commit APKs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apk/Apkd-Legacy-Android-4.4.apk apk/Apkd-Modern.apk
          git diff --cached --quiet || git commit -m "Build modern and legacy APKs"
          git push