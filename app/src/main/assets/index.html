<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APK Downloader</title><style>body{font-family:Tahoma,Arial;background:#eef7ff;margin:0;color:#09264a}.w{max-width:850px;margin:auto;padding:14px}.c{background:#fff;border:1px solid #d8e6f5;border-radius:20px;padding:16px;margin-bottom:12px}input,button,a{font:inherit}input{width:100%;box-sizing:border-box;padding:12px;border:1px solid #d8e6f5;border-radius:12px;margin:6px 0;direction:ltr}button,a.b{display:inline-block;padding:11px 13px;border:0;border-radius:12px;text-decoration:none;font-weight:bold;margin:4px;background:#2563eb;color:#fff}.g{background:#16a34a!important}.x{background:#edf4ff!important;color:#09264a!important}.r{border:1px solid #d8e6f5;border-radius:14px;padding:12px;margin-top:9px}.m{color:#60708b;font-size:12px;line-height:1.7}.s{padding:10px;border-radius:12px;background:#ecfdf5;margin-top:10px}.e{background:#fff1f2;color:#991b1b}</style></head><body><div class="w"><div class="c"><h2>أحدث APK من كل مستودع</h2><p class="m">تعرض أحدث ملف APK واحد فقط من كل مستودع.</p><label>حساب GitHub</label><input id="o" value="aljwaal1"><label>GitHub Token اختياري</label><input id="t" type="password"><button onclick="save()">حفظ الإعدادات</button><button class="x" onclick="scan()">فحص المستودعات</button><div id="s" class="s">جاهز</div></div><div class="c"><div id="r"></div></div></div><script>var stop=false;function q(i){return document.getElementById(i)}function esc(v){return String(v||'').replace(/[&<>\"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]})}function save(){localStorage.setItem('owner',q('o').value);localStorage.setItem('token',q('t').value);q('s').innerHTML='تم الحفظ'}q('o').value=localStorage.getItem('owner')||'aljwaal1';q('t').value=localStorage.getItem('token')||'';function api(u,cb){var x=new XMLHttpRequest();x.open('GET','https://api.github.com'+u,true);x.setRequestHeader('Accept','application/vnd.github+json');if(q('t').value)x.setRequestHeader('Authorization','Bearer '+q('t').value);x.onreadystatechange=function(){if(x.readyState===4){if(x.status>=200&&x.status<300)cb(null,JSON.parse(x.responseText));else cb(new Error('GitHub '+x.status));}};x.send();}function scan(){q('r').innerHTML='';q('s').className='s';q('s').innerHTML='جاري جلب المستودعات...';var owner=q('o').value.replace(/^@/,'');api('/users/'+encodeURIComponent(owner)+'/repos?per_page=100&sort=updated',function(e,repos){if(e){q('s').className='s e';q('s').innerHTML=e.message;return}var i=0,found=0;function next(){if(i>=repos.length){q('s').innerHTML='اكتمل الفحص. تم العثور على '+found+' ملف APK';return}var repo=repos[i++];q('s').innerHTML='فحص '+i+' من '+repos.length;api('/repos/'+owner+'/'+encodeURIComponent(repo.name)+'/git/trees/'+encodeURIComponent(repo.default_branch)+'?recursive=1',function(er,d){if(!er&&d.tree){var a=[],j;for(j=0;j<d.tree.length;j++){if(d.tree[j].type==='blob'&&/\.apk$/i.test(d.tree[j].path))a.push(d.tree[j])}if(a.length){a.sort(function(x,y){var ax=/^apk\//i.test(x.path)?0:1,ay=/^apk\//i.test(y.path)?0:1;return ax-ay});var f=a[0];var url='https://raw.githubusercontent.com/'+owner+'/'+repo.name+'/'+repo.default_branch+'/'+f.path.split('/').map(encodeURIComponent).join('/');q('r').innerHTML+='<div class="r"><b>'+esc(repo.name)+'</b><div class="m">'+esc(f.path)+'</div><a class="b g" href="'+url+'" download>تنزيل APK</a></div>';found++}}next()})}next()})}</script></body></html>
