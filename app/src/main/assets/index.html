<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APK Downloader</title><style>body{font-family:Tahoma,Arial;background:#eef7ff;margin:0;color:#09264a}.w{max-width:850px;margin:auto;padding:14px}.c{background:#fff;border:1px solid #d8e6f5;border-radius:20px;padding:16px;margin-bottom:12px}input,button,a{font:inherit}input{width:100%;box-sizing:border-box;padding:12px;border:1px solid #d8e6f5;border-radius:12px;margin:6px 0;direction:ltr}button,a.b{display:inline-block;padding:11px 13px;border:0;border-radius:12px;text-decoration:none;font-weight:bold;margin:4px;background:#2563eb;color:#fff}.g{background:#16a34a!important}.o{background:#d97706!important}.x{background:#edf4ff!important;color:#09264a!important}.r{border:1px solid #d8e6f5;border-radius:14px;padding:12px;margin-top:9px}.m{color:#60708b;font-size:12px;line-height:1.7}.s{padding:10px;border-radius:12px;background:#ecfdf5;margin-top:10px}.e{background:#fff1f2;color:#991b1b}.tag{display:inline-block;padding:4px 8px;border-radius:999px;font-size:11px;margin:4px}.modern{background:#dcfce7;color:#166534}.legacy{background:#ffedd5;color:#9a3412}</style></head><body><div class="w"><div class="c"><h2>نسختا APK من كل مستودع</h2><p class="m">تبقى الروابط محفوظة بعد إغلاق التطبيق. اضغط تحديث لجلب أحدث الروابط.</p><label>حساب GitHub</label><input id="o" value="aljwaal1"><label>GitHub Token اختياري</label><input id="t" type="password"><button onclick="saveSettings()">حفظ الإعدادات</button><button class="x" onclick="scan()">تحديث</button><div id="s" class="s">جاهز</div></div><div class="c"><div id="r"></div></div></div><script>var saved=[];function q(i){return document.getElementById(i)}function esc(v){return String(v||'').replace(/[&<>\"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]})}function saveSettings(){localStorage.setItem('owner',q('o').value);localStorage.setItem('token',q('t').value);q('s').innerHTML='تم حفظ الإعدادات'}function api(u,cb){var x=new XMLHttpRequest();x.open('GET','https://api.github.com'+u,true);x.setRequestHeader('Accept','application/vnd.github+json');if(q('t').value)x.setRequestHeader('Authorization','Bearer '+q('t').value);x.onreadystatechange=function(){if(x.readyState===4){if(x.status>=200&&x.status<300)cb(null,JSON.parse(x.responseText));else cb(new Error('GitHub '+x.status));}};x.send()}function kind(p){var s=p.toLowerCase();if(/legacy|old|android[-_ ]?4\.4|api[-_ ]?19/.test(s))return'legacy';if(/modern|new|latest/.test(s))return'modern';return'other'}function raw(owner,repo,branch,path){return'https://raw.githubusercontent.com/'+owner+'/'+repo+'/'+branch+'/'+path.split('/').map(encodeURIComponent).join('/')}function card(x){var modern=null,legacy=null,other=[],i,k,f=x.files;for(i=0;i<f.length;i++){k=kind(f[i].path);if(k==='modern'&&!modern)modern=f[i];else if(k==='legacy'&&!legacy)legacy=f[i];else other.push(f[i])}if(!modern&&other.length)modern=other.shift();if(!legacy&&other.length)legacy=other.shift();var h='<div class="r"><b>'+esc(x.repo)+'</b><div>';if(modern)h+='<span class="tag modern">حديث</span><div class="m">'+esc(modern.path)+'</div><a class="b g" href="'+raw(x.owner,x.repo,x.branch,modern.path)+'" download>تنزيل الحديث</a>';if(legacy)h+='<span class="tag legacy">قديم</span><div class="m">'+esc(legacy.path)+'</div><a class="b o" href="'+raw(x.owner,x.repo,x.branch,legacy.path)+'" download>تنزيل القديم</a>';h+='<a class="b x" href="https://github.com/'+x.owner+'/'+x.repo+'/actions" target="_blank">فتح Actions</a></div></div>';return h}function render(){var h='',i;for(i=0;i<saved.length;i++)h+=card(saved[i]);q('r').innerHTML=h||'<div class="m">لا توجد روابط محفوظة بعد.</div>'}function persist(){localStorage.setItem('apk_results',JSON.stringify(saved));localStorage.setItem('apk_updated',new Date().toISOString())}function loadSaved(){q('o').value=localStorage.getItem('owner')||'aljwaal1';q('t').value=localStorage.getItem('token')||'';try{saved=JSON.parse(localStorage.getItem('apk_results')||'[]')}catch(e){saved=[]}render();var d=localStorage.getItem('apk_updated');if(d&&saved.length)q('s').innerHTML='تم عرض الروابط المحفوظة. آخر تحديث: '+new Date(d).toLocaleString()}function scan(){var owner=q('o').value.replace(/^@/,'');q('s').className='s';q('s').innerHTML='جاري التحديث...';api('/users/'+encodeURIComponent(owner)+'/repos?per_page=100&sort=updated',function(e,repos){if(e){q('s').className='s e';q('s').innerHTML=e.message;return}var fresh=[],i=0;function next(){if(i>=repos.length){saved=fresh;persist();render();q('s').innerHTML='تم التحديث. وُجد '+saved.length+' مستودع يحتوي APK';return}var repo=repos[i++];q('s').innerHTML='تحديث '+i+' من '+repos.length;api('/repos/'+owner+'/'+encodeURIComponent(repo.name)+'/git/trees/'+encodeURIComponent(repo.default_branch)+'?recursive=1',function(er,d){if(!er&&d.tree){var a=[],j;for(j=0;j<d.tree.length;j++)if(d.tree[j].type==='blob'&&/\.apk$/i.test(d.tree[j].path))a.push({path:d.tree[j].path});if(a.length){a.sort(function(x,y){var ax=/^apk\//i.test(x.path)?0:1,ay=/^apk\//i.test(y.path)?0:1;return ax-ay});fresh.push({owner:owner,repo:repo.name,branch:repo.default_branch,files:a});saved=fresh.slice(0);persist();render()}}next()})}next()})}loadSaved();</script></body></html>
