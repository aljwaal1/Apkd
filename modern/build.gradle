plugins {
    id 'com.android.application'
}

android {
    namespace 'com.explapp.apkd.modern'
    compileSdk 35

    defaultConfig {
        applicationId 'com.explapp.apkd.modern'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '1.0.0'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
